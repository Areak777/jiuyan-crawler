<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>韭研公社 - 舆情日报归档</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ff6b6b, #74b9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .sub {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .link-list { list-style: none; }
        .link-list li {
            padding: 14px 20px;
            margin-bottom: 8px;
            background: #1a1a2e;
            border-radius: 10px;
            border: 1px solid #2a2a3e;
            transition: all 0.2s;
        }
        .link-list li:hover {
            border-color: #444;
            transform: translateX(4px);
        }
        .link-list a {
            color: #e0e0e0;
            text-decoration: none;
            font-size: 15px;
        }
        .link-list a:hover { color: #74b9ff; }
        .footer {
            text-align: center;
            color: #444;
            font-size: 12px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>韭研公社 舆情日报</h1>
        <p class="sub">每日自动更新 | 数据来源: jiuyangongshe.com</p>
        <ul class="link-list" id="report-list">
            <li>报告加载中...</li>
        </ul>
        <p class="footer">由 GitHub Actions 自动生成</p>
    </div>
    <script>
        // 从 reports 目录加载报告列表
        const list = document.getElementById('report-list');
        const repo = window.location.pathname.split('/')[1];
        fetch(`https://api.github.com/repos/${repo}/contents/reports`)
            .then(r => r.json())
            .then(files => {
                if (!Array.isArray(files)) {
                    list.innerHTML = '<li>暂无报告，请稍后查看</li>';
                    return;
                }
                // 过滤 HTML 报告，按日期倒序
                const reports = files
                    .filter(f => f.name.endsWith('.html'))
                    .sort((a, b) => b.name.localeCompare(a.name));
                if (reports.length === 0) {
                    list.innerHTML = '<li>暂无报告</li>';
                    return;
                }
                list.innerHTML = reports.map(f =>
                    `<li><a href="${f.path}" target="_blank">${f.name.replace('舆情日报_', '').replace('.html', '')}</a></li>`
                ).join('');
            })
            .catch(() => {
                list.innerHTML = '<li>报告加载失败</li>';
            });
    </script>
</body>
</html>
